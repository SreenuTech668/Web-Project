<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<link rel="icon" type="image" href="https://th.bing.com/th/id/OIP.8k94IvFmoWsrFYU2gbaayAHaFK?w=253&h=180&c=7&r=0&o=7&dpr=1.5&pid=1.7&rm=3">
<style>

.display{
width:260px;
height:40px;
background-color:#1f80c9;
border-radius:4px;
text-align:right;
}
input{
width:40px;
height:40px;
font-size:20px;
border-radius:10px;
margin:10px;
background-color:#000;
color:#fff;
border-style:none;
cursor:pointer;
}
.add{
background-color:palegreen;
color:green;
}
.minus{
background-color:#ba55b3;
}
.multiply{
background-color:#7db1b2;
}
.division{
background-color:#ff5733;
}
.equal{
background-color:green;
}
.clear{
background-color:red;
}
#myform{
width:57%;
margin-left:20px;
margin-top:20px;
border:2px solid black;
}
h1{
text-align:center;
font-size:30px;
margin-right:30px;
margin-top:30px;
}
@media(max-width:576px){
#myform{
width:auto;
height:auto;
}
}
</style>
</head>
<body>
      <center><h1>Basic Calculator</h1>
<form id="myform" Name="calc">
<input name="display" class="display"><br>
<input type=button value="1" OnClick="calc.display.value+='1' "  >&nbsp;&nbsp;
<input type=button value="2" OnClick="calc.display.value+='2' "  >&nbsp;&nbsp;
<input type=button value="3" OnClick="calc.display.value+='3' "  >&nbsp;&nbsp;
<input type=button value="+" class="add" OnClick="calc.display.value+='+' "  ><br><br>
<input type=button value="4" OnClick="calc.display.value+='4' "  >&nbsp;&nbsp;
<input type=button value="5" OnClick="calc.display.value+='5' "  >&nbsp;&nbsp;
<input type=button value="6" OnClick="calc.display.value+='6' "  >&nbsp;&nbsp;
<input type=button value="-" class="minus" OnClick="calc.display.value+='-' "  ><br><br>
<input type=button value="7" OnClick="calc.display.value+='7' "  >&nbsp;&nbsp;
<input type=button value="8" OnClick="calc.display.value+='8' "  >&nbsp;&nbsp;
<input type=button value="9" OnClick="calc.display.value+='9' "  >&nbsp;&nbsp;
<input type=button value="x" class="multiply" OnClick="calc.display.value+='*' "  ><br><br>
<input type=button value="0" OnClick="calc.display.value+='0' "  >&nbsp;&nbsp;
<input type=button value="c" class="clear" OnClick="calc.display.value=' ' ">&nbsp;&nbsp;
<input type=button value="=" class="equal" OnClick="calc.display.value=eval(calc.display.value)">&nbsp;&nbsp;
<input type=button value="/" class="division" OnClick="calc.display.value+='/' "  >&nbsp;&nbsp;
</form>
</body></center>
</html>
